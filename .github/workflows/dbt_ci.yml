name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:

  dbt-ci:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Install dbt dependencies
        run: |
          dbt deps

      - name: Setup CI profiles
        run: |
          mkdir -p /home/runner/.dbt

          printf '%s' "${{ secrets.CI_PRIVATE_KEY_PATH }}" > /home/runner/.dbt/rsa_key_machine.p8

          chmod 600 /home/runner/.dbt/rsa_key_machine.p8

          cat > /home/runner/.dbt/profiles.yml <<EOF
          default:
            target: ci

            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.CI_USER }}
                role: ${{ secrets.CI_ROLE }}
                warehouse: ${{ secrets.CI_WAREHOUSE }}
                database: CI
                schema: DBT_CI
                threads: 4
                authenticator: snowflake
                private_key_path: /home/runner/.dbt/rsa_key_machine.p8
                private_key_passphrase: "${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}"
          EOF

          ls -la /home/runner/.dbt

      - name: Validate dbt connection
        run: |
          dbt debug

      - name: Parse dbt project
        run: |
          dbt parse

      - name: Compile dbt project
        run: |
          dbt compile

      # ---------------------------------------------------
      # Download previous manifest for Slim CI comparison
      # ---------------------------------------------------

      - name: Download previous manifest
        if: github.event_name == 'pull_request'

        uses: dawidd6/action-download-artifact@v3

        with:
          workflow: dbt_ci.yml
          branch: main
          name: manifest-artifact
          path: state/

      - name: Verify downloaded manifest
        run: |
          ls -R state/
          test -f state/manifest.json

      # ---------------------------------------------------
      # Show modified nodes
      # ---------------------------------------------------

      - name: Show modified nodes
        run: |
          dbt ls \
            --select state:modified+ \
            --state state/

      # ---------------------------------------------------
      # Slim CI for pull requests
      # ---------------------------------------------------

      - name: Run Slim CI build
        run: |
          dbt build \
            --select state:modified+ \
            --state state/ \
            --exclude tag:skip_ci

      # ---------------------------------------------------
      # Upload dbt artifacts
      # ---------------------------------------------------

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4

        with:
          name: dbt-artifacts
          path: target/