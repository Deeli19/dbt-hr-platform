name: dbt CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  dbt-ci:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Install dbt dependencies
        run: |
          dbt deps

      - name: Setup dbt profile and Snowflake key
        run: |
          mkdir -p /home/runner/.dbt

          printf '%s' "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /home/runner/.dbt/rsa_key.p8

          chmod 600 /home/runner/.dbt/rsa_key.p8

          cat > /home/runner/.dbt/profiles.yml <<EOF
          default:
            target: dev

            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: ${{ secrets.SNOWFLAKE_SCHEMA }}
                threads: 4
                authenticator: snowflake
                private_key_path: /home/runner/.dbt/rsa_key.p8
                private_key_passphrase: "${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}"
          EOF

          ls -la /home/runner/.dbt

      - name: Validate dbt connection
        run: |
          dbt debug

      - name: Parse dbt project
        run: |
          dbt parse

      - name: Compile dbt project
        run: |
          dbt compile

      # ---------------------------------------------------
      # Download previous manifest for Slim CI comparison
      # ---------------------------------------------------

      - name: Download previous manifest
        if: github.event_name == 'pull_request'

        uses: dawidd6/action-download-artifact@v3

        with:
          workflow: dbt_ci.yml
          branch: main
          name: manifest-artifact
          path: state/

      - name: Normalize manifest location
        if: github.event_name == 'pull_request'

        run: |
          find state/
          cp state/manifest-artifact/manifest.json state/manifest.json

      - name: Verify downloaded manifest
        if: github.event_name == 'pull_request'

        run: |
          ls -R state/
          test -f state/manifest.json

      # ---------------------------------------------------
      # Show modified nodes
      # ---------------------------------------------------

      - name: Show modified nodes
        if: github.event_name == 'pull_request'

        run: |
          dbt ls \
            --select state:modified+ \
            --state state/

      # ---------------------------------------------------
      # Slim CI for pull requests
      # ---------------------------------------------------

      - name: Run Slim CI tests
        if: github.event_name == 'pull_request'

        run: |
          dbt test \
            --select state:modified+ \
            --state state/ \
            --exclude tag:skip_ci

      - name: Run Slim CI build
        if: github.event_name == 'pull_request'

        run: |
          dbt build \
            --select state:modified+ \
            --state state/ \
            --exclude tag:skip_ci

      # ---------------------------------------------------
      # Full build on main branch
      # ---------------------------------------------------

      - name: Full production-style build
        if: github.ref == 'refs/heads/main'

        run: |
          dbt build --exclude tag:skip_ci

      # ---------------------------------------------------
      # Upload current manifest artifact
      # ---------------------------------------------------

      - name: Upload manifest artifact
        if: github.ref == 'refs/heads/main'

        uses: actions/upload-artifact@v4

        with:
          name: manifest-artifact
          path: target/manifest.json

      # ---------------------------------------------------
      # Upload dbt artifacts
      # ---------------------------------------------------

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4

        with:
          name: dbt-artifacts
          path: target/