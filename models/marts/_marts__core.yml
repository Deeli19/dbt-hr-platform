version: 2

models:

  - name: fct_employee_events
    description: Employee lifecycle events

  - name: fct_employee_workforce_monthly
    description: Monthly workforce metrics

semantic_models:

  - name: employee_events

    model: ref('fct_employee_events')

    defaults:
      agg_time_dimension: event_date

    entities:
      - name: employee
        type: primary
        expr: employee_id

    dimensions:
      - name: event_date
        type: time
        type_params:
          time_granularity: day

      - name: event_type
        type: categorical

      - name: division
        type: categorical

      - name: department_type
        type: categorical

    measures:
      - name: event_count
        agg: count
        expr: 1

  - name: workforce_monthly

    model: ref('fct_employee_workforce_monthly')

    defaults:
      agg_time_dimension: metric_month

    entities:
      - name: workforce_month
        type: primary
        expr: metric_month

    dimensions:
      - name: metric_month
        type: time
        type_params:
          time_granularity: month

    measures:
      - name: hires
        agg: sum

      - name: terminations
        agg: sum

metrics:

  - name: monthly_hires
    label: Monthly Hires
    type: simple
    type_params:
      measure: hires

  - name: monthly_terminations
    label: Monthly Terminations
    type: simple
    type_params:
      measure: terminations