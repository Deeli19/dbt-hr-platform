version: 2

analyses:
  - name: fct_employee_events_v1

    description: >
      Deprecated: Use fct_employee_events_v2 for comprehensive employee lifecycle event tracking.

      Employee lifecycle events fact model capturing key workforce events
      such as hires, terminations, promotions, and transfers.
      Grain: one row per employee event.
    config:
      meta:
        deprecated: true
        replacement_model: fct_employee_events_v2
        owner_team: workforce_analytics
        domain: hr
        historical_tracking: true
        pii_contains_sensitive_employee_data: false

  - name: int_employee_status_changes_v1

    description: >
      DEPRECATED:
      This model captures only the first detected employee attribute change
      per state transition and may introduce analytical blind spots when
      multiple attributes change simultaneously.

      Use int_employee_status_changes_v2 for comprehensive workforce movement analysis.

      Historical employee workforce fact table capturing employee attribute
      changes over time using dbt snapshot validity windows.

      Each row represents a distinct employee state interval across
      organizational, supervisory, and employment attributes.

      Optimized for:
      - workforce movement analysis
      - historical headcount reporting
      - promotions and transfers
      - organizational evolution analysis
      - tenure trend reporting
      - employee lifecycle analytics

      Grain: one row per employee per historical state period.

    config:
      meta:
        status: deprecated
        owner_team: workforce_analytics
        domain: hr
        historical_tracking: true
        pii_contains_sensitive_employee_data: false

    columns:

      - name: employee_history_id
        data_type: varchar
        description: Surrogate key uniquely identifying each employee historical state period.
        tests:
          - not_null
          - unique

      - name: employee_id
        data_type: varchar
        description: Unique identifier for employee.

      - name: effective_start_date
        data_type: timestamp_ntz
        description: Timestamp when employee state became active.
        tests:
          - not_null

      - name: effective_end_date
        data_type: timestamp_ntz
        description: Timestamp when employee state expired.

      - name: employee_status
        data_type: varchar
        description: Historical employee status during the validity period.

      - name: title
        data_type: varchar
        description: Historical employee title during the validity period.

      - name: division
        data_type: varchar
        description: Historical employee organizational division.

      - name: supervisor
        data_type: varchar
        description: Historical employee reporting manager.

      - name: days_in_state
        data_type: integer
        description: Number of days employee remained in the historical state period.

      - name: is_current_record
        data_type: boolean
        description: Indicates whether record represents the employee's current active state.

      - name: employee_change_type
        data_type: varchar
        description: >
          Categorizes the first detected workforce attribute transition
          between historical employee records.